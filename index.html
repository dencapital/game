<meta name="theme-color" content="#0e1319">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  body{margin:0;background:#0e1319;color:#e8eef5;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh}
  .lock{text-align:center;padding:24px;max-width:320px;width:100%}
  .lock .ico{font-size:44px}
  h1{font-size:18px;font-weight:800;margin:12px 0 4px}
  .dim{color:#8b98a9;font-size:13px;margin-bottom:18px}
  input{width:100%;box-sizing:border-box;padding:13px;font-size:20px;text-align:center;letter-spacing:6px;
    border-radius:12px;border:1px solid #2a3543;background:#1d2632;color:#e8eef5;outline:none}
  input:focus{border-color:#4c8dff}
  button{width:100%;margin-top:12px;padding:13px;font-size:15px;font-weight:700;border:none;border-radius:12px;
    background:#4c8dff;color:#fff;cursor:pointer}
  .err{color:#e5534b;font-size:13px;margin-top:10px;min-height:18px}
  .shake{animation:sh .4s}
  @keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>

</div>

function b64d(str){const b=atob(str);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function tryDecrypt(pass){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(PAYLOAD.SALT),iterations:150000,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(PAYLOAD.IV)},key,b64d(PAYLOAD.DATA));
  return new TextDecoder().decode(pt);}
async function unlock(){
  const p=document.getElementById('pass').value.trim();
  if(!p)return;
  try{
    const html=await tryDecrypt(p);
    try{sessionStorage.setItem('sg_pass',p);}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    const el=document.getElementById('err');el.textContent='Неверный код';
    const lk=document.getElementById('lock');lk.classList.remove('shake');void lk.offsetWidth;lk.classList.add('shake');
  }}
(async()=>{
  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('sw.js');}catch(e){}}
  let p=null;try{p=sessionStorage.getItem('sg_pass');}catch(e){}
  if(p){try{const html=await tryDecrypt(p);document.open();document.write(html);document.close();}catch(e){}}
  else document.getElementById('pass').focus();
})();
